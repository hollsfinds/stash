<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Stash, a no-download savings app</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F88378">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Stash">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --coral:#F88378; --peach:#FBCEB1; --sage:#AFD9AE; --teal:#43B3AE; --espresso:#2C2421;
  --bg:#FAF6F1; --card:#FFFFFF; --line:#ECE4DB; --muted:#8E837A; --ink:#2C2421;
  --teal-d:#2C7C78; --coral-d:#9A3D2C; --in:#1D9E75; --out:#D85A30; --warn-bg:#FAEEDA; --warn-ink:#7A4B0B;
  --serif:'Raleway','Poppins',sans-serif; --sans:'Poppins',-apple-system,Segoe UI,sans-serif;
  --r:14px; --r-sm:10px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;overflow-x:hidden;max-width:100%;width:100%;-webkit-text-size-adjust:100%;text-size-adjust:100%}
#root{max-width:100%;overflow-x:hidden}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-weight:400;-webkit-font-smoothing:antialiased;line-height:1.5}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit;font-size:15px;max-width:100%}
.hidden{display:none!important}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

.app{display:grid;grid-template-columns:330px 1fr;min-height:100vh}
.side{background:var(--espresso);color:#fff;padding:26px 18px;display:flex;flex-direction:column;gap:6px;position:sticky;top:0;height:100vh;overflow-y:auto}
.sideadd{background:#fff;border-radius:var(--r);padding:11px;margin-top:16px;color:var(--ink)}
.sideadd .cardhd{color:var(--ink)}
.brand{font-family:var(--serif);font-size:24px;font-weight:600;letter-spacing:.5px;margin:0 0 2px}
.nav{display:flex;flex-direction:column;gap:4px;margin-top:24px}
.nav button{display:flex;align-items:center;gap:12px;background:transparent;border:0;color:#e9e2db;padding:12px 14px;border-radius:var(--r-sm);font-size:15px;text-align:left;width:100%;transition:.15s}
.nav button:hover{background:rgba(255,255,255,.08)}
.nav button.on{background:var(--teal);color:#0c3a37;font-weight:500}
.nav .ico{width:20px;text-align:center;font-size:17px}
.side .foot{margin-top:auto;font-size:11px;opacity:.55;line-height:1.6}
.addbtn{margin-top:18px;background:var(--coral);color:#fff;border:0;border-radius:var(--r-sm);padding:13px;font-size:15px;font-weight:500;width:100%}
.addbtn:hover{filter:brightness(.96)}
.plusbtn{margin-top:14px;background:var(--teal);color:#0c3a37;border:0;border-radius:var(--r-sm);padding:9px;font-size:13px;font-weight:500;cursor:pointer;width:100%}
.plusbtn:hover{filter:brightness(.97)}

.main{padding:30px 40px 80px;max-width:1120px;width:100%}
.viewhead{font-family:var(--serif);font-size:23px;font-weight:600;margin:0 0 3px}
.viewsub{color:var(--muted);font-size:13px;margin:0 0 14px}
.topgrid{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px;align-items:stretch}
.chgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.topgrid>*,.chgrid>*,.chartcard{min-width:0}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px 18px}
.cardhd{font-family:var(--serif);font-size:15px;font-weight:600}
.grid{display:grid;gap:16px}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:9px 12px}
.tile .lab{font-size:10px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin:0 0 3px}
.tile .val{font-size:14px;font-weight:500;font-family:var(--sans)}

.hero{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 22px;margin-bottom:16px}
.talk{background:#E6F4F3;color:var(--teal-d);border-radius:var(--r-sm);padding:10px 14px;font-size:15px;margin:0 0 12px;display:flex;gap:10px;align-items:flex-start}
.talk .q{font-size:20px;line-height:1}
.heronums{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.heronums .big{font-family:var(--sans);font-size:32px;font-weight:600;line-height:1}
.heronums .of{color:var(--muted);font-size:15px}
.heronums .pc{margin-left:auto;font-family:var(--sans);font-size:28px;color:var(--teal-d);font-weight:600}
.hlab{font-size:11px;letter-spacing:.7px;text-transform:uppercase;color:var(--teal-d);font-weight:500;margin-bottom:2px}
.hero .big{font-family:var(--sans);font-size:40px;font-weight:600;line-height:1;color:var(--ink)}
.barwrap{height:16px;border-radius:8px;background:var(--peach);margin:12px 0 4px;overflow:hidden}
.bar{height:100%;background:var(--teal);width:0;border-radius:9px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.barscale{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}

.gcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:11px 14px;cursor:pointer;transition:.15s}
.gcard:hover{border-color:var(--teal);transform:translateY(-2px)}
.gbar{height:10px;border-radius:5px;background:var(--peach);margin:12px 0 6px;overflow:hidden}
.gbar div{height:100%;background:var(--teal)}

.qrow{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
.ql{font-size:12px;color:var(--muted);display:block;margin-bottom:4px}
.qrow input,.qrow select{padding:11px 13px;border:1px solid var(--line);border-radius:var(--r-sm);background:#fff;color:var(--ink)}
.qrow input:focus,.qrow select:focus{outline:none;border-color:var(--teal)}

.search{width:100%;max-width:360px;padding:11px 14px;border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:16px;background:#fff;color:var(--ink)}
.search:focus{outline:none;border-color:var(--teal)}
.act{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);font-size:15px;gap:12px}
.act:last-child{border-bottom:0}
.act .meta{color:var(--muted);font-size:13px}
.gtag{font-size:11px;background:#F1ECE6;color:#6a625b;border-radius:10px;padding:2px 9px;margin-right:8px}
.amtin{color:var(--in);font-weight:500}
.amtout{color:var(--out);font-weight:500}

.ladder{display:flex;gap:6px}
.rung{flex:1;height:32px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px}

.persona{display:flex;gap:14px;align-items:center;background:#E6F4F3;color:var(--teal-d);border-radius:var(--r);padding:16px 20px;margin-top:18px}
.persona .ico{font-size:26px}
.persona b{display:block;font-family:var(--serif);font-size:16px}

.field{margin-bottom:16px}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
.field input,.field select{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:var(--r-sm);background:#fff;color:var(--ink)}
.field input:focus,.field select:focus{outline:none;border-color:var(--teal)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.btn{background:var(--teal);color:#0c3a37;border:0;border-radius:var(--r-sm);padding:13px 22px;font-size:15px;font-weight:500}
.btn:hover{filter:brightness(.97)}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
.btn.coral{background:var(--coral);color:#fff}
.btn:disabled{opacity:.4;cursor:not-allowed;filter:none}
.seg{display:inline-flex;background:#F1ECE6;border-radius:6px;padding:4px;gap:4px}
.seg button{border:0;background:transparent;padding:14px 18px;border-radius:4px;font-size:14px;color:var(--muted);line-height:1}
.seg button.on{background:#fff;color:var(--ink);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08)}

.warn{background:var(--warn-bg);color:var(--warn-ink);border:1px solid #E6D3A8;border-radius:var(--r);padding:16px 18px;font-size:14px;line-height:1.55;display:flex;gap:12px}
.warn .ico{font-size:22px;flex-shrink:0}
.warn b{font-weight:600}

.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(120px);background:var(--espresso);color:#fff;padding:15px 22px;border-radius:var(--r);font-size:15px;box-shadow:0 8px 30px rgba(0,0,0,.25);transition:transform .4s cubic-bezier(.2,.8,.3,1);z-index:60;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}

.pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{border:1px solid var(--line);background:#fff;border-radius:20px;padding:8px 16px;font-size:14px;color:var(--muted)}
.pill.on{background:var(--teal);color:#0c3a37;border-color:var(--teal);font-weight:500}

.chartcard{display:flex;flex-direction:column}
.chartcard svg{display:block;width:100%}
.chartpoint{cursor:pointer}
.charttip{position:absolute;background:#2C2421;color:#fff;font-size:11px;line-height:1.5;padding:7px 10px;border-radius:8px;white-space:nowrap;pointer-events:none;display:none;z-index:5;box-shadow:0 4px 14px rgba(0,0,0,.2)}
.stattip{position:fixed;background:#2C2421;color:#fff;font-size:12px;line-height:1.4;padding:8px 11px;border-radius:8px;max-width:240px;pointer-events:none;display:none;z-index:200;box-shadow:0 6px 18px rgba(0,0,0,.25)}
.capd{font-size:13px;color:var(--muted);min-height:20px;margin-top:10px}
.legend{display:flex;gap:16px;font-size:12px;color:var(--muted);margin-top:4px;flex-wrap:wrap}
.legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:-1px}

.scrim{position:fixed;inset:0;background:rgba(20,15,12,.5);display:flex;align-items:center;justify-content:center;z-index:80;padding:20px}
.modal{background:#fff;border-radius:var(--r);padding:26px 26px 22px;max-width:440px;width:100%}
.modal h3{font-family:var(--serif);font-size:21px;margin:0 0 14px}
.modal .acts{display:flex;gap:10px;justify-content:flex-end;margin-top:6px}

.confetti{position:fixed;inset:0;pointer-events:none;z-index:90;overflow:hidden}
.confetti span{position:absolute;top:-12px;width:9px;height:14px;border-radius:2px;animation:fall 2.6s linear forwards}
@keyframes fall{to{transform:translateY(106vh) rotate(540deg);opacity:.85}}
.celebrate{position:fixed;top:-140px;left:50%;transform:translateX(-50%);background:#fff;border:2px solid var(--teal);border-radius:var(--r);padding:15px 28px;text-align:center;z-index:95;box-shadow:0 12px 40px rgba(0,0,0,.18);animation:drop 3.6s cubic-bezier(.2,.85,.3,1) forwards}
.celebrate .big{font-family:var(--serif);font-size:22px;color:var(--teal-d);font-weight:600}
.celebrate .sub{font-size:13px;color:var(--muted);margin-top:2px}
@keyframes drop{0%{top:-140px;opacity:0}14%{top:26px;opacity:1}82%{top:26px;opacity:1}100%{top:26px;opacity:0}}

@media(max-width:860px){
  .app{grid-template-columns:1fr}
  .side{position:fixed;bottom:0;left:0;right:0;top:auto;height:auto;flex-direction:row;align-items:center;padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:50;gap:0;border-top:1px solid #000;overflow:hidden}
  .brand,.side .foot,.addbtn,.sideadd,.plusbtn{display:none}
  .nav{flex-direction:row;margin:0;width:100%;gap:0;overflow:hidden}
  .nav button{flex:1 1 0;min-width:0;flex-direction:column;gap:3px;font-size:10px;padding:8px 4px;border-radius:8px}
  .nav button.on{background:transparent;color:var(--teal)}
  .nav .ico{font-size:21px}
  .main{padding:24px 18px calc(110px + env(safe-area-inset-bottom))}
  .topgrid{grid-template-columns:1fr}
  .chgrid{grid-template-columns:1fr}
  .viewhead{font-size:22px}
  .heronums .big{font-size:32px}
  .hero .big{font-size:30px}
  .herobar{gap:14px 16px}
  .herobar-mid{flex:1 1 100%!important;max-width:none!important;order:3}
  .herobar>div:first-child{order:1}
  .herobar>div:last-child{order:2;margin-left:auto;text-align:right}
  .pill{padding:9px 14px!important;font-size:13px!important}
  .btn.ghost{min-height:42px}
  .tile{padding:13px 12px}
  .charttip{white-space:normal;max-width:62vw}
  .stattip{max-width:74vw;font-size:13px}
  .fab{display:flex!important}
}
.fab{display:none;position:fixed;right:18px;bottom:74px;width:58px;height:58px;border-radius:50%;background:var(--coral);color:#fff;border:0;font-size:28px;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(248,131,120,.5);z-index:55}
</style>
</head>

const SWEET_MILE={

/* ---------- ENGINE ---------- */
const PHI=0.6180339887, DAY=86400000;
const frac=x=>x-Math.floor(x);
const pickIdx=(saved,seed)=>Math.floor(5*frac((Math.round(saved*100)+seed)*PHI));
const money=n=>(n<0?"-$":"$")+Math.abs(Math.round(n)).toLocaleString("en-US");
const todayIso=()=>new Date().toISOString().slice(0,10);
const dateMs=iso=>new Date(iso+"T00:00:00").getTime();
function tokens(s,c){return s.replace(/{fullname}/g,c.fullName).replace(/{name}/g,c.name).replace(/{goal}/g,c.goal).replace(/{left}/g,money(c.left)).replace(/{pct}/g,Math.round(c.pct*100)+"%").replace(/{amt}/g,money(c.amt||0));}
function sampleStdev(a){if(a.length<2)return 0;const m=a.reduce((x,y)=>x+y,0)/a.length;return Math.sqrt(a.reduce((x,y)=>x+(y-m)*(y-m),0)/(a.length-1));}

function computeGoal(goal){
  const d=(goal.deposits||[]).slice().filter(x=>x.date).sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:0);
  const ins=d.map(x=>+x.in||0), outs=d.map(x=>+x.out||0);
  const saved=ins.reduce((a,b)=>a+b,0)-outs.reduce((a,b)=>a+b,0);
  const target=+goal.target||0;
  const pct=target>0?saved/target:0;
  const bucket=pct>=1?100:Math.floor((pct*100)/10)*10;
  const left=Math.max(target-saved,0);
  const count=d.length, last=d[count-1]||null;
  const lastIn=last?(+last.in||0):0, lastOut=last?(+last.out||0):0;
  const posIns=ins.filter(x=>x>0);
  const avgIn=posIns.length?posIns.reduce((a,b)=>a+b,0)/posIns.length:0;
  const cv=avgIn>0?sampleStdev(posIns)/avgIn:0;
  const lastType=lastOut>0?"withdrawal":(lastIn>0?"deposit":"none");
  let sizeTier=""; if(lastType==="deposit")sizeTier=lastIn>=avgIn*1.75?"big":(lastIn<=avgIn*0.5?"small":"mid");
  let persona; if(avgIn===0)persona="Just getting started"; else if(cv<=0.5)persona="The Slow & Steady Saver"; else if(posIns.length<=3)persona="The Sprinter"; else persona="The Sporadic Saver";

  const name=state.profile.nickname?.trim()||"babe";
  const fullName=state.profile.fullName?.trim()||name;
  const gname=goal.name?.trim()||"your goal";
  const ctx={name,fullName,goal:gname,left,pct,amt:0};
  const B=curBank();

  const talkback=tokens(B.M[bucket][pickIdx(saved,7)],ctx);
  let reaction;
  if(lastType==="none")reaction=tokens(B.F,ctx);
  else{const key=lastType==="withdrawal"?"withdrawal":"deposit|"+sizeTier; reaction=tokens(B.R[key][pickIdx(saved,3)],{...ctx,amt:lastType==="withdrawal"?lastOut:lastIn});}
  const personaBlurb=tokens(B.P[persona][pickIdx(saved,5)],ctx);
  let special=""; if(pct>=1)special=tokens(B.S.full,ctx); else if(pct>=0.9)special=tokens(B.S.p90,ctx); else if(pct>=0.45&&pct<0.55)special=tokens(B.S.half,ctx);

  const biggest=posIns.length?Math.max(...posIns):0;
  const today=new Date(); today.setHours(0,0,0,0); const todayMs=today.getTime();
  const startMs=goal.startDate?dateMs(goal.startDate):(d.length?dateMs(d[0].date):todayMs);
  const daysSaving=Math.max(Math.round((todayMs-startMs)/DAY),0);
  const targetMs=goal.targetDate?dateMs(goal.targetDate):null;
  let projected="Not yet", projMs=null;
  if(saved>=target&&target>0)projected="Done!";
  else if(count>=2&&daysSaving>0&&saved>0){const rate=saved/daysSaving; if(rate>0){const need=Math.ceil(left/rate); projMs=todayMs+need*DAY; projected="About "+new Date(projMs).toLocaleDateString("en-US",{month:"short",day:"numeric"});}}
  let nextMile=null; if(pct<1){const nb=Math.min(bucket+10,100); nextMile={amt:Math.max(target*nb/100-saved,0),pct:nb};}
  let neededWeekly=null; if(targetMs&&targetMs>todayMs&&left>0){const wks=(targetMs-todayMs)/(7*DAY); if(wks>0)neededWeekly=left/wks;}

  return {id:goal.id,gname,saved,target,pct,bucket,left,count,avgIn,biggest,daysSaving,projected,nextMile,neededWeekly,
    talkback,reaction,personaBlurb,persona,special,lastType,name,deposits:d,startMs,todayMs,targetMs,projMs};
}

function migrate(s){
  if(!s)return s;
  if(!s.goals){ // old single-goal shape
    s={profile:{nickname:s.setup?.nickname||"",fullName:s.setup?.fullName||""},voice:s.voice||{tier:"sassy",enabled:true},activeGoalId:null,
       goals:[{id:uid(),name:s.setup?.goalName||"",target:+s.setup?.target||0,startDate:s.setup?.startDate||todayIso(),targetDate:s.setup?.targetDate||"",deposits:(s.deposits||[]).map(d=>({id:d.id||uid(),...d}))}]};
  }
  s.profile=s.profile||{nickname:"",fullName:""};
  s.voice=s.voice||{tier:"sassy",enabled:true};
  (s.goals||[]).forEach(g=>{ if(g.notes===undefined)g.notes=""; (g.deposits||[]).forEach(d=>{if(!d.id)d.id=uid();}); });
  s.backup=s.backup||{lastBackup:null,snoozeUntil:0,silenced:false};
  return s;
}

function segPick(b){dir=b.dataset.dir;[...b.parentNode.children].forEach(x=>x.classList.toggle("on",x===b));}
function addDeposit(){
  const amt=parseFloat($("#f_amt").value);
  if(!amt||amt<=0){toast("Pop in an amount first.");return;}
  const gid=$("#f_goal")?$("#f_goal").value:(currentGoal()&&currentGoal().id);
  const g=goalById(gid); if(!g){toast("Add a goal first.");return;}
  const before=computeGoal(g).pct;
  g.deposits.push({id:uid(),date:$("#f_date").value||todayIso(),note:$("#f_note").value.trim(),in:dir==="in"?amt:0,out:dir==="out"?amt:0});
  g.deposits.sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:0);
  save();
  const c=computeGoal(g); state.activeGoalId=gid; view="goal";
  const ci=crossInfo(before,c.pct);
  render(); window.scrollTo(0,0);
  setTimeout(()=>{ if(ci){confettiBurst(); celebrate(ci.label,"for "+g.name);} if(voiceOn()) toast(ci&&c.special?c.special:c.reaction); },360);
}

function addUnified(){

function distUpdate(){
  const total=numVal($("#f_total")); let sum=0;
  state.goals.forEach(g=>{sum+=numVal($("#sp_"+g.id));});
  const o=$("#sp_total"); if(!o)return; const left=total-sum;
  if(total<=0){o.textContent="Enter an amount, then distribute it.";o.style.color="";}
  else if(Math.abs(left)<0.005){o.textContent="All set · "+dispMoney(total)+" distributed.";o.style.color="#1D9E75";}
  else if(left>0){o.textContent=dispMoney(left)+" left to assign.";o.style.color="#D85A30";}
  else{o.textContent="Over by "+dispMoney(-left)+".";o.style.color="#D85A30";}
}
function splitAmounts(total,weights){
  const T=total, sum=weights.reduce((a,b)=>a+b,0), n=weights.length;
  let amts = sum>0 ? weights.map(w=>Math.floor(T*w/sum)) : weights.map(()=>Math.floor(T/n));
  let leftover=Math.round((T-amts.reduce((a,b)=>a+b,0))*100)/100;
  const order=weights.map((w,i)=>({i,w})).filter(x=>sum<=0||x.w>0).sort((a,b)=>b.w-a.w);
  let k=0;
  while(leftover>=1-1e-9 && order.length){ amts[order[k%order.length].i]+=1; leftover=Math.round((leftover-1)*100)/100; k++; }
  if(leftover>0.005 && order.length) amts[order[0].i]=Math.round((amts[order[0].i]+leftover)*100)/100;
  return amts;
}
function splitEven(){
  const total=numVal($("#f_total")); if(total<=0){toast("Enter an amount first.");return;}
  const amts=splitAmounts(total,state.goals.map(()=>1));
  state.goals.forEach((g,i)=>setAlloc($("#sp_"+g.id),amts[i])); distUpdate();
}
function splitByNeed(){
  const total=numVal($("#f_total")); if(total<=0){toast("Enter an amount first.");return;}
  const needs=state.goals.map(g=>Math.max((+g.target||0)-computeGoal(g).saved,0));
  const amts=splitAmounts(total, needs.reduce((a,b)=>a+b,0)>0?needs:state.goals.map(()=>1));
  state.goals.forEach((g,i)=>setAlloc($("#sp_"+g.id),amts[i])); distUpdate();
}
function splitClosest(){
  const total=numVal($("#f_total")); if(total<=0){toast("Enter an amount first.");return;}
  const arr=state.goals.map(g=>({g,need:Math.max((+g.target||0)-computeGoal(g).saved,0)})).sort((a,b)=>a.need-b.need);
  const alloc={}; let rem=Math.round(total*100)/100;
  arr.forEach(({g,need})=>{const give=Math.min(Math.floor(need),Math.floor(rem)); if(give>0){alloc[g.id]=(alloc[g.id]||0)+give; rem=Math.round((rem-give)*100)/100;}});
  if(rem>0.005&&arr.length){const g=arr[arr.length-1].g; alloc[g.id]=Math.round(((alloc[g.id]||0)+rem)*100)/100;}
  state.goals.forEach(g=>setAlloc($("#sp_"+g.id),alloc[g.id]||0)); distUpdate();
}
function clearAlloc(){state.goals.forEach(g=>{const el=$("#sp_"+g.id);if(el)el.value="";});distUpdate();}
function addUnifiedSubmit(){
  const total=numVal($("#f_total"));
  if(total<=0){toast("Enter an amount first.");return;}
  const date=$("#f_date").value||todayIso(), note=$("#f_note").value.trim(), sid=uid();
  let allocs=[];
  if(state.goals.length===1){allocs=[{g:state.goals[0],amt:total}];}
  else{
    let sum=0; state.goals.forEach(g=>{const amt=numVal($("#sp_"+g.id)); if(amt>0){allocs.push({g,amt});sum+=amt;}});
    if(!allocs.length){toast("Distribute your amount to at least one goal.");return;}
    if(Math.abs(sum-total)>=0.005){toast("Your distribution ("+dispMoney(sum)+") has to add up to your "+(dir==="in"?"deposit":"withdrawal")+" ("+dispMoney(total)+").");return;}
  }
  let best=null,bestGoal=null,lastG=null;
  allocs.forEach(({g,amt})=>{const before=computeGoal(g).pct; g.deposits.push({id:uid(),date,note,in:dir==="in"?amt:0,out:dir==="out"?amt:0,split:sid}); g.deposits.sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:0); lastG=g; const ci=crossInfo(before,computeGoal(g).pct); if(ci&&(!best||ci.t>best.t)){best=ci;bestGoal=g;}});
  save(); closeModal(); view="home"; render(); window.scrollTo(0,0);
  setTimeout(()=>{
    if(best){confettiBurst();celebrate(best.label,"for "+bestGoal.name);}
    if(allocs.length===1){const c=computeGoal(lastG); if(voiceOn())toast(best&&c.special?c.special:c.reaction);}
    else toast((dir==="in"?"Added ":"Pulled ")+money(total)+" across "+allocs.length+" goals.");
  },360);
}

/* ---------- charts ---------- */
function chartGrowth(c,ns=""){
  const deps=c.deposits.slice().sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:0);
  if(!deps.length)return `<div class="capd" style="margin-top:8px">Add a deposit to see your trend.</div>`;
  const dmap={},order=[];
  deps.forEach(r=>{const k=r.date; if(!(k in dmap)){dmap[k]=0;order.push(k);} dmap[k]+=(+r.in||0)-(+r.out||0);});
  const n=order.length; let run=0; window._g=window._g||{}; const G=(window._g[ns]=[]);
  const cum=order.map((k,i)=>{const day=dmap[k]; run+=day; const isIn=day>=0;
    G.push({xf:(n===1?0.5:i/(n-1)),html:`<b>${fmtDate(k)}</b><br><span style="color:${isIn?'#9FE1CB':'#F0997B'}">${isIn?'+'+money(day):'-'+money(Math.abs(day))}</span> that day · ${money(run)} total`});
    return run;});
  const W=300,H=60,pad=6, maxV=Math.max(...cum,1);

async function sendFeedback(btn){

function editRow(gid,id){

function saveRow(gid,id){
  const g=goalById(gid), r=g.deposits.find(d=>d.id===id), amt=parseFloat($("#e_amt").value)||0;

/* ---------- backup ---------- */
function exportData(){const blob=new Blob([JSON.stringify({schemaVersion:STASH_SCHEMA,...state},null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="stash-backup-"+todayIso()+".json";a.click();if(state.backup){state.backup.lastBackup=Date.now();save();}toast("Backed up. Keep that file safe.");}
let _silPick;
function maybeBackupReminder(){
  const b=state.backup; if(!b||b.silenced)return;
  const now=Date.now(); if(now<(b.snoozeUntil||0))return;
  if(!state.goals.some(g=>(g.deposits||[]).length>0))return;
  if(b.lastBackup && now-b.lastBackup<=14*864e5)return;
  showBackupReminder();
}
function showBackupReminder(){
  $("#modalHost").innerHTML=`<div class="scrim"><div class="modal"><h3>Time to back up?</h3>
    <p style="color:#5b524b;font-size:14px;margin:0 0 16px">Your data lives only on this device. A quick backup means a new phone, a deleted app, or cleared browser data won't wipe your progress.</p>
    <div class="acts" style="flex-wrap:wrap;gap:8px;justify-content:flex-end"><button class="btn ghost" onclick="snoozeBackup(7)">Remind me in a week</button><button class="btn ghost" onclick="silenceBackupFlow()">Stop reminding me</button><button class="btn coral" onclick="exportData();closeModal()">Back up now</button></div>
  </div></div>`;
}
function snoozeBackup(days){ if(state.backup){state.backup.snoozeUntil=Date.now()+days*864e5;save();} closeModal(); }
function silenceBackupFlow(){
  _silPick=undefined;
  $("#modalHost").innerHTML=`<div class="scrim"><div class="modal"><h3>Stop backup reminders?</h3>
    <p style="color:#5b524b;font-size:14px;margin:0 0 12px">Choose how long. While reminders are off, backing up is on you.</p>
    <div class="pills" style="margin-bottom:14px"><button class="pill" onclick="setSilencePick(30,this)">For 30 days</button><button class="pill" onclick="setSilencePick(90,this)">For 90 days</button><button class="pill" onclick="setSilencePick(0,this)">Forever</button></div>
    <label style="display:flex;gap:9px;align-items:flex-start;font-size:13px;color:#5b524b;margin-bottom:16px;line-height:1.5"><input type="checkbox" id="silenceAgree" oninput="updSilence()" style="margin-top:3px;flex-shrink:0"><span>I understand my data is only on this device, and if I don't back up, a new phone, a deleted app, or clearing browser data will <b>erase everything</b>, with no way for Stash to recover it.</span></label>
    <div class="acts"><button class="btn ghost" onclick="showBackupReminder()">Back</button><button class="btn coral" id="silenceBtn" disabled onclick="confirmSilence()">Turn off reminders</button></div>
  </div></div>`;
}
function setSilencePick(days,btn){ _silPick=days; [...btn.parentNode.children].forEach(x=>x.classList.toggle("on",x===btn)); updSilence(); }
function updSilence(){ const a=$("#silenceAgree"),b=$("#silenceBtn"); if(b)b.disabled=!(a&&a.checked)||_silPick===undefined; }
function confirmSilence(){ if(!state.backup)return; if(_silPick===0)state.backup.silenced=true; else state.backup.snoozeUntil=Date.now()+_silPick*864e5; save(); closeModal(); toast("Reminders off. Back up sometimes anyway!"); }
function whatIfPanel(gs){
  return `<div class="card" style="margin-bottom:12px"><div class="cardhd" style="margin-bottom:4px">What if…</div>
    <p style="color:var(--muted);font-size:12px;margin:0 0 12px;line-height:1.5">Curious how a weekly habit pays off? Pick a goal and a weekly amount, and I'll tell you the date you'd hit it.</p>
    <div class="field" style="margin-bottom:9px"><label>For which goal?</label><select id="wio_scope" onchange="whatIfCalc()"><option value="__all__">All goals</option>${gs.map(c=>`<option value="${c.id}">${esc(capFirst(c.gname))}</option>`).join("")}</select></div>
    <div class="field" style="margin-bottom:9px"><label>If I save this each week</label><input id="wio_week" type="text" inputmode="decimal" placeholder="Per week ($)" oninput="whatIfCalc()" onfocus="rawInput(this)" onblur="fmtInput(this);whatIfCalc()"></div>
    <p id="wio_out" class="capd">Pick a goal and a weekly amount.</p>
  </div>`;

function whatIfCalc(){
  const out=$("#wio_out"); if(!out)return;
  const scope=$("#wio_scope")?$("#wio_scope").value:"__all__", wk=numVal($("#wio_week"));
  let left,name;
  if(scope==="__all__"){ const gs=state.goals.map(computeGoal); left=gs.reduce((a,c)=>a+c.left,0); name="all your goals"; }
  else { const g=goalById(scope); if(!g){out.textContent="";return;} const c=computeGoal(g); left=c.left; name=capFirst(c.gname); }
  if(!wk||wk<=0){out.textContent="Pick a goal and a weekly amount.";return;}
  if(left<=0){out.textContent=name+" is already funded. Go you.";return;}
  const weeks=Math.ceil(left/wk), d=new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()+weeks*7);
  out.textContent=`Saving ${money(wk)}/week, you'll fund ${name} around ${d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})} (${weeks} weeks).`;
}
function moveToPlus(){
  const payload={schemaVersion:STASH_SCHEMA,profile:state.profile,voice:state.voice,goals:state.goals};
  const enc=btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
  if(!PLUS_IMPORT_URL){ toast("Plus isn't live yet, your goals and history will come with you when it launches."); return; }
  if(enc.length>60000){ exportData(); toast("You've got a lot saved, I downloaded a backup file to import into Plus."); return; }
  location.href=PLUS_IMPORT_URL+"#stash="+enc;
}

  $(".fab")?.classList.remove("hidden");
  let body="";
  if(view==="home") body = state.goals.length>1 ? vOverview() : vGoal();
  else if(view==="goal") body=vGoal();
  else if(view==="add") body=vAdd();
  else if(view==="activity") body=vActivity();
  else if(view==="goals") body=vGoals();
  else if(view==="settings") body=vSettings();
  else body=state.goals.length>1?vOverview():vGoal();
  const mobile=window.innerWidth<=860;
  root.innerHTML=`<div class="app"><aside class="side"><div class="brand">Stash</div>
    <div style="font-size:11px;opacity:.6;letter-spacing:1px;text-transform:uppercase">Holls Finds Digital</div>
    <nav class="nav">${navBtn("home","◎","Home")}${navBtn("goals","⚑","Goals")}${navBtn("activity","≣","Activity")}${navBtn("settings","⚙","Settings")}</nav>
    ${(!mobile&&state.goals.length)?`<div class="sideadd"><div class="cardhd" style="font-size:15px;margin-bottom:10px">Track Deposit</div>${addUnified()}</div>`:""}
    <button class="plusbtn" onclick="go('settings')">✦ Stash Plus</button>
    <div class="foot">Your data stays on this device.<br>Back it up in Settings.</div></aside>
    <main class="main">${body}</main></div>`;
}

/* ---------- boot ---------- */
addEventListener("wheel",()=>{const a=document.activeElement;if(a&&a.type==="number")a.blur();},{passive:true});
let _rz; addEventListener("resize",()=>{clearTimeout(_rz);_rz=setTimeout(()=>render(),200);});
state=load();
if(!state){state=blank();view="welcome";}else{view="home";}
render();
maybeBackupReminder();
setInterval(()=>{ if(!$("#modalHost").innerHTML) maybeBackupReminder(); }, 3600000);
/* ---------- service worker (network-first; keeps the app updatable + offline) ---------- */
if("serviceWorker" in navigator){ window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); }); }
</script>
</body>
</html>
